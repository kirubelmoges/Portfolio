services:
  - type: web
    name: portfolio-backend
    env: python
    # The command to build your app
    buildCommand: cd portfolio && ./build.sh
    # The command to start your app
    startCommand: cd portfolio && gunicorn portfolio.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      # ... your other environment variables
      - key: DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false

  # Frontend Static Site
  - type: static
    name: portfolio-frontend
    buildCommand: cd frontend/pages && npm install && npm run build
    publishPath: frontend/pages/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://portfolio-backend-ee1z.onrender.com/kirubel/api
      - key: REACT_APP_MEDIA_URL
        value: https://portfolio-backend-ee1z.onrender.com
      - key: CI
        value: false